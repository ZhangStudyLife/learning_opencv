# Mecanum Wheel Controllers
# Joint names compatible with Clearpath Ridgeback

# Publish all joint states
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

# Velocity Controllers for each wheel
front_left_wheel_velocity_controller:
  type: velocity_controllers/JointVelocityController
  joint: front_left_wheel_joint
  pid: {p: 100.0, i: 0.01, d: 10.0}

front_right_wheel_velocity_controller:
  type: velocity_controllers/JointVelocityController
  joint: front_right_wheel_joint
  pid: {p: 100.0, i: 0.01, d: 10.0}

rear_left_wheel_velocity_controller:
  type: velocity_controllers/JointVelocityController
  joint: rear_left_wheel_joint
  pid: {p: 100.0, i: 0.01, d: 10.0}

rear_right_wheel_velocity_controller:
  type: velocity_controllers/JointVelocityController
  joint: rear_right_wheel_joint
  pid: {p: 100.0, i: 0.01, d: 10.0}

# Gazebo's default robot hw sim also looks here for wheel joint PID gains.
gazebo_ros_control:
  pid_gains:
    front_left_wheel_joint: {p: 100.0, i: 0.01, d: 10.0}
    front_right_wheel_joint: {p: 100.0, i: 0.01, d: 10.0}
    rear_left_wheel_joint: {p: 100.0, i: 0.01, d: 10.0}
    rear_right_wheel_joint: {p: 100.0, i: 0.01, d: 10.0}
